</p></figure><figure><a href=/projects/magic-mirror/ ><img src=/images/projects/2016/magic-mirror/magic-mirror.ffbd.jpg><figcaption><h2>Magic Mirror</h2></figcaption></a><p>Using your thoughts to control a crystal ball</p></figure><figure><a href=/projects/metaverse-art-gallery/ ><img src=/images/projects/2016/metaverse-art-gallery/metaverse-art-gallery.8d09.jpg><figcaption><h2>Metaverse Art Gallery</h2></figcaption></a><p>An art curation platform for the metaverse</p></figure><figure><a href=/projects/sonic-equations/ ><img src=/images/projects/2016/sonic-equations/sonic-equations.378f.jpg><figcaption><h2>Sonic Equations</h2></figcaption></a><p>Exploring the limits of sonic communication</p></figure><figure><a href=/projects/superficial-substantive/ ><img src=/images/projects/2016/superficial-substantive/superficial-substantive.8524.jpg><figcaption><h2>Superficial / Substantive</h2></figcaption></a><p>Solving all the wrong problems with technology</p></figure></div><h1>Art-A-Hack&#8482; 2015</h1><div class=grid><figure><a href=/projects/aurora-borealis/ ><img src=/images/projects/2015/aurora-borealis/aurora-borealis.cde8.jpg><figcaption><h2>Aurora Borealis</h2></figcaption></a><p>Projecting laser heartbeats on the Aurora Borealis</p></figure><figure><a href=/projects/deep-thought/ ><img src=/images/projects/2015/deep-thought/deep-thought.0029.jpg><figcaption><h2>Deep Thought</h2></figcaption></a><p>Translating brainwaves into 3D sculptures</p></figure><figure><a href=/projects/imbalances-in-tech/ ><img src=/images/projects/2015/imbalances-in-tech/imbalances-in-tech.1c83.jpg><figcaption><h2>Imbalances In Tech</h2></figcaption></a><p>Access privilege on demand from your phone</p></figure><figure><a href=/projects/multi-faceted-bass/ ><img src=/images/projects/2015/multi-faceted-bass/multi-faceted-bass.b147.jpg><figcaption><h2>The Multi-Faceted Bass</h2></figcaption></a><p>Transforming an acoustic bass cello into a electronic instrument</p></figure><figure><a href=/projects/oculus-fiber/ ><img src=/images/projects/2015/oculus-fiber/oculus-fiber.13c3.jpg><figcaption><h2>Oculus Fiber</h2></figcaption></a><p>Explore fabrics in VR as though they were architectures</p></figure><figure><a href=/projects/surveillance-culture/ ><img src=/images/projects/2015/surveillance-culture/surveillance-culture.d3ac.jpg><figcaption><h2>Surveillance Culture</h2></figcaption></a><p>How much do we reveal about ourselves online?</p></figure><figure><a href=/projects/utopia/ ><img src=/images/projects/2015/utopia/utopia.9de1.jpg><figcaption><h2>Utopia</h2></figcaption></a><p>A tour through the remnants of Second Life</p></figure></div><h1>Art-A-Hack&#8482; 2014</h1><p class=center>Our inaugral Art-A-Hack&#8482; in 2014 is <a href=/summer-2014/report/ >documented in this project report</a>.</p></article></main><section id=sponsors><header><h1>Sponsors</h1></header><p>We are supported by:</p><ul><li><a href=http://www.thoughtworks.com><img src=/images/sponsors/thoughtworks.780e.png alt=ThoughtWorks></a></li><li><a href=http://engineering.nyu.edu/ ><img src=/images/sponsors/tandon.16d1.png alt="NYU Tandon School of Engineering"></a></li><li><a href=http://www.microsoft.com><img src=/images/sponsors/microsoft.8f09.png alt=Microsoft></a></li><li><a href=http://www.oreilly.com/ ><img src=/images/sponsors/oreilly.6a64.png alt="O'Reilly"></a></li><li class=vertical><a href=http://www.meetup.com/volumetric><img src=/images/sponsors/volumetric.77de.png alt="The Volumetric Society"></a></li><li><a href=http://new.livestream.com/ ><img src=/images/sponsors/livestream.bd22.png alt=Livestream></a></li><li class=small><a href=http://www.originmagazine.com/ ><img src=/images/sponsors/origin.2e5c.png alt="Origin Magazine"></a></li><li class=small><a href=http://cyland.org/ ><img src=/images/sponsors/cyland.7adb.png alt="Cyland Media Art Lab"></a></li></ul></section><script src=/javascript/script.6c6e.js></script><!-- Sliders on pages --><!-- Sliders on indexes --></body
